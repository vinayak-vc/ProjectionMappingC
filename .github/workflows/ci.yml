name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Reuse built vcpkg packages via the GitHub Actions cache.
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-msvc
            os: windows-latest
            preset: release
          - name: linux-gcc
            os: ubuntu-latest
            preset: gcc-release
          - name: linux-clang
            os: ubuntu-latest
            preset: clang-release
          - name: macos-clang
            os: macos-latest
            preset: release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Export GitHub Actions cache variables for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL ?? '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL ?? '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN ?? '');

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        run: .\third_party\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Install dependencies (Unix)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        run: ./third_party/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DPMSDK_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
